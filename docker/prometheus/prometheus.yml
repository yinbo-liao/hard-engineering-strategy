global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "Hardness-orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets:
          - Hardness-orchestrator:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "Hardness-orchestrator"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090
